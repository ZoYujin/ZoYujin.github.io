  summary: >
    I am a Ph.D. student working on reliable and efficient foundation models, with a focus on
    multimodal LLMs and vision–language models. My research studies how foundation models acquire,
    preserve, and use knowledge under real-world constraints such as compute, latency, and memory.
    Recent work spans memory-free continual adaptation, efficient hallucination mitigation, and
    post-training / reinforcement learning for general-purpose VLMs.

